name: Build and Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  AZURE_CONTAINER_APPS_IMAGE: fastapi-mongodb-agent
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linting and type checking
        run: |
          pip install ruff
          ruff check .

      - name: Run unit tests
        run: |
          pip install pytest pytest-asyncio httpx
          pytest tests/ -v --tb=short

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_CONTAINER_REGISTRY }}.azurecr.io
          username: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
          password: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ secrets.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.AZURE_CONTAINER_APPS_IMAGE }}:${{ github.sha }}
          build-args: PYTHON_VERSION=3.13

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          azurecredentials: ${{ secrets.AZURE_CREDENTIALS }}
          containerAppName: ${{ secrets.AZURE_CONTAINER_APP_NAME }}
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerImageRegistry: ${{ secrets.AZURE_CONTAINER_REGISTRY }}.azurecr.io
          imageToDeploy: ${{ env.AZURE_CONTAINER_APPS_IMAGE }}:${{ github.sha }}
          environmentVariables: |
            MONGODB_URL=${{ secrets.MONGODB_URL }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            LOGFIRE_TOKEN=${{ secrets.LOGFIRE_TOKEN }}
            DATABASE_NAME=myapp
          targetPort: 8000
          location: eastus

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: psf/black@stable
        with:
          options: "--check --diff"
          version: "24.1"